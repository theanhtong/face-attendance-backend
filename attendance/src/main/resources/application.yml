spring:
  application:
    name: attendance
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/attendance_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin123}
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:your-secret-key-change-this-in-production}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:900}
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800}

internal:
  api-key: ${INTERNAL_API_KEY:your-secret-key-change-this-in-production}

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY:KOD+A70PEgZTYqPGuCNOSMbx8nVYYoBZLEAH1ZGXwiY=}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
