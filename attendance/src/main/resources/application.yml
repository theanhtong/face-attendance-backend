spring:
  application:
    name: attendance

  datasource:
    url: jdbc:postgresql://localhost:5432/attendance_db
    username: postgres
    password: admin123
    driver-class-name: org.postgresql.Driver

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: your-secret-key-change-this-in-production
  access-token-expiry: 900
  refresh-token-expiry: 604800

internal:
  api-key: your-internal-api-key-change-this
