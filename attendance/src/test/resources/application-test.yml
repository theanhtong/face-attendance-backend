spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/attendance_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  sql:
    init:
      mode: never

jwt:
  secret: ${JWT_SECRET:test-secret-key-for-ci-minimum-32-characters}
  access-token-expiry: 900
  refresh-token-expiry: 604800

internal:
  api-key: ${INTERNAL_API_KEY:test-internal-api-key}
