name: Spring Boot CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: attendance_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run schema.sql
        run: |
          psql -h 127.0.0.1 -U postgres -d attendance_db -f schema.sql

      - name: Grant execute permission for mvnw
        working-directory: attendance
        run: chmod +x mvnw

      - name: Build and test
        working-directory: attendance
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/attendance_db
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: test-secret-key-for-ci-minimum-32-characters-long
          INTERNAL_API_KEY: test-internal-api-key
        run: ./mvnw verify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: attendance/target/surefire-reports/
